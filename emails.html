<!DOCTYPE html>
<html>
<body>

<h2>Email History</h2>

<table border="1">
    <tr>
        <th>Organization</th>
        <th>Emails</th>
        <th>Content</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log.org_name }}</td>
        <td>{{ log.emails }}</td>
        <td><pre>{{ log.content }}</pre></td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
